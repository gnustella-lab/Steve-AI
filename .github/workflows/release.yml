name: Release compiled mod jar

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to create/update (for example, v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and publish release asset
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release jar
        run: gradle clean build --stacktrace

      - name: Resolve release metadata
        id: release_metadata
        shell: bash
        run: |
          set -euo pipefail
          tag_name="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag_name="${{ inputs.tag_name }}"
          fi

          jar_path="$(find build/libs -maxdepth 1 -type f -name '*.jar' | sort | head -n 1)"
          if [ -z "${jar_path}" ]; then
            echo "No JAR was produced under build/libs" >&2
            exit 1
          fi

          sha256sum "${jar_path}" > "${jar_path}.sha256"

          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"
          echo "jar_path=${jar_path}" >> "${GITHUB_OUTPUT}"
          echo "checksum_path=${jar_path}.sha256" >> "${GITHUB_OUTPUT}"
          echo "jar_name=$(basename "${jar_path}")" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_metadata.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: Steve AI ${{ steps.release_metadata.outputs.tag_name }}
          body: |
            Release build for Steve AI.

            Asset:
            - `${{ steps.release_metadata.outputs.jar_name }}`

            The `.sha256` file can be used to verify the downloaded JAR.
          files: |
            ${{ steps.release_metadata.outputs.jar_path }}
            ${{ steps.release_metadata.outputs.checksum_path }}
